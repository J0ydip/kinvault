version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kinvault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kinvault
      POSTGRES_PASSWORD: kinvaultpassword
      POSTGRES_DB: kinvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: kinvault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
